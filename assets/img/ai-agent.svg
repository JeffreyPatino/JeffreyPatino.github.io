<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Coding Agent Project Thumbnail</title>
  <desc id="desc">Gradient card with terminal and tool icons representing a Python AI coding agent project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#2b2d42"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8ef6d9"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" rx="28" fill="url(#bg)"/>

  <rect x="72" y="78" width="356" height="204" rx="16" fill="#111827" opacity="0.92"/>
  <circle cx="102" cy="105" r="6" fill="#ef4444"/>
  <circle cx="124" cy="105" r="6" fill="#f59e0b"/>
  <circle cx="146" cy="105" r="6" fill="#10b981"/>

  <text x="96" y="146" fill="#8ef6d9" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">&gt; model</text>
  <text x="96" y="176" fill="#e5e7eb" font-family="Menlo, Monaco, Consolas, monospace" font-size="15">call_tool(get_file_content)</text>
  <text x="96" y="206" fill="#e5e7eb" font-family="Menlo, Monaco, Consolas, monospace" font-size="15">call_tool(run_python_file)</text>
  <text x="96" y="236" fill="#8ef6d9" font-family="Menlo, Monaco, Consolas, monospace" font-size="15">final_answer()</text>

  <g transform="translate(462 116)">
    <rect width="106" height="106" rx="22" fill="url(#accent)"/>
    <circle cx="53" cy="53" r="26" fill="#111827"/>
    <rect x="33" y="39" width="10" height="28" rx="3" fill="#8ef6d9"/>
    <rect x="63" y="39" width="10" height="28" rx="3" fill="#8ef6d9"/>
    <rect x="43" y="69" width="20" height="8" rx="4" fill="#8ef6d9"/>
  </g>

  <text x="74" y="320" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">AI Coding Agent</text>
</svg>

